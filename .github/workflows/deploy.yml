name: Deploy

# ⚠️  このワークフローは GitHub Secrets 登録前は実行しないこと
#
# 必要な Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST        : mgx-prod-01 の IP またはホスト名
#   VPS_USER        : /var/www/enishi-lab を所有する SSH ユーザー名
#   SSH_PRIVATE_KEY : deploy 専用 ed25519 秘密鍵 (下記手順参照)
#
# SSH キーペア生成手順 (ローカル PC で実行すること — VPS 上では生成しない):
#
#   # 1. ローカル PC でキーペア生成
#   ssh-keygen -t ed25519 -C "github-actions-deploy" \
#              -f ./enishi_deploy_key -N ""
#
#   # 2. 公開鍵だけを VPS の authorized_keys に追加
#   ssh-copy-id -i ./enishi_deploy_key.pub <VPS_USER>@<VPS_HOST>
#   # または手動:
#   # cat ./enishi_deploy_key.pub | ssh <VPS_USER>@<VPS_HOST> \
#   #   "cat >> ~/.ssh/authorized_keys"
#
#   # 3. 秘密鍵を GitHub Secrets (SSH_PRIVATE_KEY) に登録
#   cat ./enishi_deploy_key
#
#   # 4. ローカルのキーファイルを削除 (repo には commit しない)
#   rm ./enishi_deploy_key ./enishi_deploy_key.pub
#
# Secrets 登録完了後、下記トリガーを以下へ変更して有効化:
#   on:
#     push:
#       branches: [main]
#
# Rollback:
#   git revert → push で旧 dist が再デプロイされる
#   MGX (/var/www/mgx-poker, nginx 設定) への影響: なし

# 現時点は手動実行のみ (Secrets 登録後に push トリガーへ変更)
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version は package.json の packageManager フィールドから自動解決

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Validate Secrets
        env:
          VPS_HOST:        ${{ secrets.VPS_HOST }}
          VPS_USER:        ${{ secrets.VPS_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=()
          [ -z "$VPS_HOST" ]        && missing+=(VPS_HOST)
          [ -z "$VPS_USER" ]        && missing+=(VPS_USER)
          [ -z "$SSH_PRIVATE_KEY" ] && missing+=(SSH_PRIVATE_KEY)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ GitHub Secrets が未登録です: ${missing[*]}"
            echo "   Repository → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ すべての Secrets が登録されています"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # rsync 対象: /var/www/enishi-lab のみ
      # mgx-poker.com / /var/www/mgx-poker / nginx 設定には一切触れない
      - name: Deploy via rsync
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -avz --delete dist/ \
            "${VPS_USER}@${VPS_HOST}:/var/www/enishi-lab/"
