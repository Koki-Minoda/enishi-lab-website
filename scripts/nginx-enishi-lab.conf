# =============================================================
# ENISHI-LAB Website — nginx Virtual Host (HTTP + HTTPS)
# =============================================================
# Domain  : enishi-lab.com, www.enishi-lab.com
# Stack   : Astro 7 static output (pre-generated HTML/CSS/JS)
# Root    : /var/www/enishi-lab
# SSL     : Let's Encrypt (certbot 管理)
#           /etc/letsencrypt/live/enishi-lab.com/
#
# Note: /etc/nginx/sites-available/mgx-poker は変更しない
# =============================================================
#
# 初回セットアップ手順:
#
#   # 1. config 配置 (HTTP のみの初期状態)
#   sudo cp nginx-enishi-lab.conf /etc/nginx/sites-available/enishi-lab.com
#   sudo ln -s /etc/nginx/sites-available/enishi-lab.com \
#              /etc/nginx/sites-enabled/enishi-lab.com
#   sudo nginx -t && sudo nginx -s reload
#
#   # 2. certbot で SSL 追加 (下記 Cloudflare 手順を先に読むこと)
#   sudo certbot --nginx -d enishi-lab.com -d www.enishi-lab.com
#
#   # 3. certbot 実行後にこのファイルの内容が VPS 側と一致するか確認
#   cat /etc/nginx/sites-available/enishi-lab.com
#
# Cloudflare を使っている場合の certbot 手順:
#
#   certbot の HTTP-01 チャレンジは Cloudflare を経由するため、
#   チャレンジ中だけ Cloudflare のプロキシを一時停止する。
#
#   [1] Cloudflare Dashboard → DNS → enishi-lab.com / www.enishi-lab.com
#       → Proxy status を「DNS only (グレー)」に変更
#   [2] sudo certbot --nginx -d enishi-lab.com -d www.enishi-lab.com
#   [3] 成功後、Proxy status を「Proxied (オレンジ)」に戻す
#
# Rollback:
#   sudo certbot delete --cert-name enishi-lab.com
#   sudo rm /etc/nginx/sites-enabled/enishi-lab.com
#   sudo nginx -s reload
#   → MGX への影響なし
#
# =============================================================

# HTTPS — メインサーバー (certbot が管理)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name enishi-lab.com www.enishi-lab.com;

    root /var/www/enishi-lab;
    index index.html;

    # Astro static: routes are pre-generated as <slug>/index.html
    location / {
        try_files $uri $uri/ =404;
    }

    # Astro outputs content-hashed filenames — safe for long-term caching
    location ~* \.(css|js|woff2?|ttf|ico|svg|png|jpe?g|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # ↓ ここから下は Certbot が管理している部分なのでそのまま
    ssl_certificate     /etc/letsencrypt/live/enishi-lab.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/enishi-lab.com/privkey.pem;   # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                        # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                          # managed by Certbot
}

# HTTP → HTTPS リダイレクト (certbot が管理)
server {
    if ($host = www.enishi-lab.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = enishi-lab.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;

    server_name enishi-lab.com www.enishi-lab.com;
    return 404; # managed by Certbot
}
